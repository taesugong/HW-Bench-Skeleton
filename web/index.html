<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>HW Bench Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --border: #2a2e38;
    --text: #e6e8eb;
    --muted: #8b92a0;
    --accent: #4f9cff;
    --good: #3ddc97;
    --bad: #ff5c6c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 16px;
    max-width: 1200px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 13px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--bad);
  }
  .dot.on { background: var(--good); }

  canvas { width: 100% !important; height: 320px !important; }

  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin: 14px 0 6px;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    background: #11131a;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  button {
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    padding: 9px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    width: 100%;
  }
  button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  button.danger { background: var(--bad); color: white; }
  .row2 { display: flex; gap: 8px; }
  .row2 button { margin-top: 8px; }

  .log-box {
    margin-top: 16px;
    font-size: 11px;
    color: var(--muted);
    max-height: 120px;
    overflow-y: auto;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
</style>
</head>
<body>

<h1>HW Bench Monitor</h1>
<div class="sub">Nucleo / ESP32 데이터 로깅 &amp; 테스트 신호 생성 콘솔</div>

<div class="layout">
  <!-- 좌측: 실시간 차트 -->
  <div class="panel">
    <div class="status-row">
      <div class="dot" id="connDot"></div>
      <span id="connText">연결 확인 중...</span>
    </div>
    <canvas id="chart"></canvas>
  </div>

  <!-- 우측: 컨트롤 패널 -->
  <div class="panel">
    <strong style="font-size:14px;">제어</strong>

    <label>DAC 출력 값 (0–4095)</label>
    <input type="number" id="dacValue" value="2048" min="0" max="4095" />
    <button onclick="sendCommand('DAC', document.getElementById('dacValue').value)">DAC 적용</button>

    <label>GPIO 토글 (핀 번호)</label>
    <input type="text" id="gpioPin" placeholder="예: PA5" />
    <button class="secondary" onclick="sendCommand('GPIO', document.getElementById('gpioPin').value)">토글</button>

    <label>사용자 명령 (자유 입력)</label>
    <div class="row2">
      <input type="text" id="customName" placeholder="이름 (예: FREQ)" />
      <input type="text" id="customValue" placeholder="값 (예: 1000)" />
    </div>
    <button class="secondary" onclick="sendCustom()">전송</button>

    <hr style="border-color: var(--border); margin: 16px 0;" />

    <strong style="font-size:14px;">로깅</strong>
    <div class="row2">
      <button onclick="startLogging()">시작</button>
      <button class="danger" onclick="stopLogging()">정지</button>
    </div>

    <div class="log-box" id="eventLog"></div>
  </div>
</div>

<script>
const API_BASE = "http://localhost:8000";
const WS_URL = "ws://localhost:8000/ws";
const MAX_POINTS = 200; // 화면에 보여줄 최근 데이터 개수 (너무 길면 차트가 무거워짐)

const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Channel 0',
      data: [],
      borderColor: '#4f9cff',
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.15,
    }]
  },
  options: {
    animation: false,
    scales: {
      x: { ticks: { color: '#8b92a0' }, grid: { color: '#2a2e38' } },
      y: { ticks: { color: '#8b92a0' }, grid: { color: '#2a2e38' } },
    },
    plugins: { legend: { labels: { color: '#e6e8eb' } } }
  }
});

function logEvent(msg) {
  const box = document.getElementById('eventLog');
  const time = new Date().toLocaleTimeString();
  box.innerHTML = `<div>[${time}] ${msg}</div>` + box.innerHTML;
}

function setConnUI(connected) {
  document.getElementById('connDot').classList.toggle('on', connected);
  document.getElementById('connText').textContent = connected ? '보드 연결됨 (WebSocket)' : '연결 끊김';
}

// ---- WebSocket: 실시간 데이터 수신 ----
let ws;
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => { setConnUI(true); logEvent('WebSocket 연결됨'); };
  ws.onclose = () => { setConnUI(false); logEvent('WebSocket 끊김, 3초 후 재시도'); setTimeout(connectWS, 3000); };
  ws.onerror = () => setConnUI(false);
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'data') {
      const { channel, value, board_ts } = msg.payload;
      addDataPoint(board_ts, value);
    }
  };
}

function addDataPoint(ts, value) {
  chart.data.labels.push(ts);
  chart.data.datasets[0].data.push(value);
  if (chart.data.labels.length > MAX_POINTS) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }
  chart.update('none'); // 애니메이션 없이 즉시 갱신 (실시간 느낌)
}

// ---- REST: 명령 전송 ----
async function sendCommand(name, value) {
  try {
    const res = await fetch(`${API_BASE}/api/command`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, value: String(value) }),
    });
    const data = await res.json();
    logEvent(`명령 전송: ${data.sent}`);
  } catch (e) {
    logEvent(`명령 전송 실패: ${e.message}`);
  }
}

function sendCustom() {
  const name = document.getElementById('customName').value;
  const value = document.getElementById('customValue').value;
  if (!name) return;
  sendCommand(name, value);
}

async function startLogging() {
  const res = await fetch(`${API_BASE}/api/logging/start`, { method: 'POST' });
  const data = await res.json();
  logEvent(`로깅 시작: ${data.file}`);
}

async function stopLogging() {
  await fetch(`${API_BASE}/api/logging/stop`, { method: 'POST' });
  logEvent('로깅 정지');
}

connectWS();
</script>

</body>
</html>
